name: E2E smoke (manual)

# Heavy job: builds the release binary and drives it through a real WebDriver
# (tauri-driver + WebKitWebDriver) under xvfb. Triggered manually so it never
# blocks the PR gate — promote to a schedule once it's been validated locally
# (see e2e/README.md). macOS is unsupported by tauri-driver; Windows needs a
# self-hosted runner with a desktop session, so this runs on Linux headless.
on:
  workflow_dispatch:
  # Nightly smoke — PREPARED BUT DORMANT. Validate the harness on a runner first
  # (see e2e/README.md), then uncomment to activate the schedule:
  # schedule:
  #   - cron: "0 3 * * *" # 03:00 UTC daily

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E (Linux, headless)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            nasm webkit2gtk-driver xvfb

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable

      - name: Build the frontend (embedded into the release binary)
        working-directory: src-frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install e2e harness deps
        working-directory: e2e
        run: npm install

      - name: Run E2E under xvfb
        working-directory: e2e
        run: xvfb-run -a npm run test:e2e
